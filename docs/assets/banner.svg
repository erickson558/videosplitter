<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">VideoSplitter banner</title>
  <desc id="desc">Banner promocional de VideoSplitter con interfaz y exportacion a multiples formatos.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09131f"/>
      <stop offset="55%" stop-color="#123a57"/>
      <stop offset="100%" stop-color="#1d6f8c"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff7fb"/>
      <stop offset="100%" stop-color="#c9e8f2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="24" flood-color="#071018" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1015" cy="106" r="142" fill="#9ee8ff" opacity="0.12"/>
  <circle cx="1180" cy="514" r="224" fill="#f3b95d" opacity="0.11"/>
  <circle cx="160" cy="550" r="210" fill="#4dd0a8" opacity="0.10"/>

  <g transform="translate(82 88)">
    <text x="0" y="0" fill="#9fd8e8" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700">VIDEO WORKFLOW FOR WINDOWS</text>
    <text x="0" y="96" fill="#ffffff" font-size="72" font-family="Segoe UI, Arial, sans-serif" font-weight="800">VideoSplitter</text>
    <text x="0" y="152" fill="#d5ecf4" font-size="28" font-family="Segoe UI, Arial, sans-serif">Divide videos por segundos o en partes iguales</text>
    <text x="0" y="192" fill="#d5ecf4" font-size="28" font-family="Segoe UI, Arial, sans-serif">y exporta a MP4, MKV o MOV con FFmpeg embebido.</text>

    <g transform="translate(0 244)">
      <rect x="0" y="0" rx="18" ry="18" width="194" height="52" fill="#f6b454"/>
      <text x="28" y="34" fill="#102031" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">GUI desktop</text>
      <rect x="214" y="0" rx="18" ry="18" width="218" height="52" fill="#18354c" stroke="#7bcde4" stroke-width="2"/>
      <text x="242" y="34" fill="#d5ecf4" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Versionado Vx.x.x</text>
    </g>
  </g>

  <g transform="translate(744 88)" filter="url(#shadow)">
    <rect x="0" y="0" rx="28" ry="28" width="452" height="466" fill="#102235"/>
    <rect x="24" y="24" rx="24" ry="24" width="404" height="418" fill="url(#panel)"/>
    <rect x="24" y="24" rx="24" ry="24" width="404" height="54" fill="#14334b"/>
    <circle cx="54" cy="51" r="8" fill="#ff7b72"/>
    <circle cx="80" cy="51" r="8" fill="#ffd166"/>
    <circle cx="106" cy="51" r="8" fill="#4dd0a8"/>
    <text x="146" y="58" fill="#eef7fb" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700">VideoSplitter V1.0.1</text>

    <text x="52" y="118" fill="#163349" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Modo de division</text>
    <rect x="52" y="134" rx="12" ry="12" width="148" height="42" fill="#163349"/>
    <text x="74" y="161" fill="#f5fbfe" font-size="18" font-family="Segoe UI, Arial, sans-serif">Por segundos</text>
    <rect x="212" y="134" rx="12" ry="12" width="166" height="42" fill="#7bcde4"/>
    <text x="236" y="161" fill="#102031" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Partes iguales</text>

    <text x="52" y="224" fill="#163349" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Cantidad de partes</text>
    <rect x="52" y="240" rx="12" ry="12" width="92" height="42" fill="#ffffff" stroke="#7bb9cb" stroke-width="2"/>
    <text x="93" y="267" text-anchor="middle" fill="#163349" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700">4</text>

    <text x="52" y="332" fill="#163349" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Formato</text>
    <rect x="52" y="348" rx="12" ry="12" width="328" height="42" fill="#ffffff" stroke="#7bb9cb" stroke-width="2"/>
    <text x="74" y="375" fill="#163349" font-size="18" font-family="Segoe UI, Arial, sans-serif">Short 9:16 + MP4</text>

    <rect x="52" y="408" rx="16" ry="16" width="204" height="42" fill="#f6b454"/>
    <text x="154" y="435" text-anchor="middle" fill="#102031" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="800">Dividir video</text>
  </g>
</svg>